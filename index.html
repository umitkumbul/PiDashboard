<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pi Dashboard</title>
    
    <!-- PWA & iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pi Dash">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2333/2333313.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f0f1a">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f1a;
            --card-bg: #16213e;
            --text: #e8e8f0;
            --primary: #6C63FF;
            --accent: #FF6B9D;
            --border: rgba(255, 255, 255, 0.08);
        }
        body, html {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        
        /* Dashboard Grid */
        .dashboard-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 40px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .app-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 24px 16px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .app-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
        }
        .emoji { font-size: 2.8rem; }
        .name { font-weight: 600; font-size: 1rem; }
        
        /* App View (Iframe) */
        #app-view {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 1000;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }
        #app-view.active {
            transform: translateY(0);
        }
        iframe {
            flex: 1;
            border: none;
            width: 100%;
            height: 100%;
        }
        
        /* App Header / Toolbar */
        .app-header {
            background: var(--card-bg);
            padding: env(safe-area-inset-top) 20px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }
        .close-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: var(--text);
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        @media (max-width: 400px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="dashboard-container" id="dashboard">
        <div class="container">
            <h1>Pi Dashboard</h1>
            <div class="grid">
                <div class="app-card" onclick="openApp('/grocery/')">
                    <span class="emoji">🛒</span>
                    <span class="name">Grocery App</span>
                </div>
                <div class="app-card" onclick="openApp('/learn/')">
                    <span class="emoji">📚</span>
                    <span class="name">LearnWords</span>
                </div>
                <div class="app-card" onclick="window.location.href='http://raspberrypi:8123'">
                    <span class="emoji">🏠</span>
                    <span class="name">Home Assistant</span>
                </div>
                <div class="app-card" onclick="window.location.href='http://pi.hole/admin/'">
                    <span class="emoji">🛡️</span>
                    <span class="name">Pi-hole</span>
                </div>
            </div>
        </div>
    </div>

    <div id="app-view">
        <div class="app-header">
            <button class="close-btn" onclick="closeApp()">← Dashboard</button>
            <span id="app-title" style="font-weight: 600; opacity: 0.8;">Uygulama</span>
            <div style="width: 80px;"></div> <!-- Spacer -->
        </div>
        <iframe id="app-iframe" src="about:blank"></iframe>
    </div>

    <script>
        const appView = document.getElementById('app-view');
        const iframe = document.getElementById('app-iframe');
        const appTitle = document.getElementById('app-title');
        const dashboard = document.getElementById('dashboard');

        function openApp(url) {
            iframe.src = url;
            appTitle.innerText = url.includes('grocery') ? 'Grocery App' : 'LearnWords';
            appView.classList.add('active');
            dashboard.style.transform = 'scale(0.95) opacity(0)';
        }

        function closeApp() {
            appView.classList.remove('active');
            dashboard.style.transform = 'scale(1) opacity(1)';
            setTimeout(() => {
                iframe.src = 'about:blank';
            }, 400);
        }

        // PWA Update Logic
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(reg => {
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'activated') window.location.reload();
                        });
                    });
                });
            });
        }
    </script>
</body>
</html>
